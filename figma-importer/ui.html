<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 18px; background: var(--figma-color-bg); color: var(--figma-color-text); font-size: 12px; }
    h1 { margin: 0 0 8px; font-size: 16px; line-height: 1.25; }
    p { margin: 0 0 14px; color: var(--figma-color-text-secondary); line-height: 1.45; }
    .drop { border: 1px dashed var(--figma-color-border); border-radius: 10px; padding: 18px; background: var(--figma-color-bg-secondary); }
    input { width: 100%; box-sizing: border-box; }
    .meta { margin-top: 14px; padding: 12px; border: 1px solid var(--figma-color-border); border-radius: 8px; background: var(--figma-color-bg); }
    .meta b { display: block; margin-bottom: 4px; }
    .screens { max-height: 190px; overflow: auto; margin-top: 10px; border-top: 1px solid var(--figma-color-border); padding-top: 8px; }
    .screen { display: flex; justify-content: space-between; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--figma-color-border); }
    .screen span:last-child { color: var(--figma-color-text-secondary); white-space: nowrap; }
    button { width: 100%; height: 34px; margin-top: 14px; border: 0; border-radius: 8px; background: var(--figma-color-bg-brand); color: var(--figma-color-text-onbrand); font: inherit; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .45; cursor: default; }
    .status { margin-top: 12px; min-height: 18px; color: var(--figma-color-text-secondary); }
    .error { color: var(--figma-color-text-danger); }
  </style>
</head>
<body>
  <h1>Advanced Mock Styles Importer</h1>
  <p>Choose a <code>.figma-export.zip</code> downloaded from the prototype. The import runs locally in this open Figma file and does not need auth.</p>

  <div class="drop">
    <input id="file" type="file" accept=".zip,.figma-export.zip,application/zip">
  </div>

  <div id="meta" class="meta" hidden></div>
  <button id="import" disabled>Import into this Figma file</button>
  <div id="status" class="status"></div>

  <script>
    const decoder = new TextDecoder();
    const fileInput = document.getElementById('file');
    const importBtn = document.getElementById('import');
    const meta = document.getElementById('meta');
    const statusEl = document.getElementById('status');
    let currentPackage = null;

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      currentPackage = null;
      importBtn.disabled = true;
      status('');
      meta.hidden = true;
      if (!file) return;
      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const files = parseStoredZip(bytes);
        const manifest = readJson(files, 'manifest.json');
        const tokens = readJson(files, 'tokens.json');
        const screens = (manifest.screens || []).map((entry) => readJson(files, entry.path));
        const assets = {};
        screens.forEach((screen) => {
          if (screen.visual && screen.visual.path && files[screen.visual.path]) assets[screen.visual.path] = files[screen.visual.path];
        });
        currentPackage = { manifest, tokens, screens, assets };
        renderMeta(currentPackage);
        importBtn.disabled = false;
        status('Ready to import.');
      } catch (error) {
        status(error && error.message ? error.message : String(error), true);
      }
    });

    importBtn.addEventListener('click', () => {
      if (!currentPackage) return;
      importBtn.disabled = true;
      status('Importing...');
      parent.postMessage({ pluginMessage: { type: 'import-package', package: currentPackage } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data && event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'import-complete') {
        status('Imported ' + msg.screens + ' screens and created ' + msg.components + ' component samples.');
        importBtn.disabled = false;
      } else if (msg.type === 'import-error') {
        status(msg.message || 'Import failed.', true);
        importBtn.disabled = false;
      }
    };

    function renderMeta(pkg) {
      const manifest = pkg.manifest;
      const screens = manifest.screens || [];
      meta.innerHTML =
        '<b>' + escapeHtml(manifest.preset && manifest.preset.name || 'Export') + '</b>' +
        '<div>' + screens.length + ' screens · ' + screens.filter((screen) => screen.visual).length + ' pixel references · schema ' + escapeHtml(manifest.schema || 'unknown') + '</div>' +
        '<div class="screens">' + screens.map((screen) => {
          const variant = screen.variant && screen.variant.label && screen.variant.label !== 'Default' ? screen.variant.label : '';
          return '<div class="screen"><span>' + escapeHtml(screen.label || screen.viewId) + (variant ? ' / ' + escapeHtml(variant) : '') + '</span><span>' + Math.round(screen.width || 0) + ' x ' + Math.round(screen.height || 0) + '</span></div>';
        }).join('') + '</div>';
      meta.hidden = false;
    }

    function parseStoredZip(bytes) {
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const files = {};
      let offset = 0;
      while (offset + 4 <= bytes.length) {
        const sig = read32(view, offset);
        if (sig === 0x02014b50 || sig === 0x06054b50) break;
        if (sig !== 0x04034b50) throw new Error('Unsupported ZIP structure.');
        const method = read16(view, offset + 8);
        if (method !== 0) throw new Error('This importer expects stored ZIP entries.');
        const compressedSize = read32(view, offset + 18);
        const nameLen = read16(view, offset + 26);
        const extraLen = read16(view, offset + 28);
        const nameStart = offset + 30;
        const dataStart = nameStart + nameLen + extraLen;
        const dataEnd = dataStart + compressedSize;
        const name = decoder.decode(bytes.slice(nameStart, nameStart + nameLen));
        files[name] = bytes.slice(dataStart, dataEnd);
        offset = dataEnd;
      }
      return files;
    }

    function readJson(files, path) {
      if (!files[path]) throw new Error('Missing ' + path + ' in export package.');
      return JSON.parse(decoder.decode(files[path]));
    }

    function read16(view, offset) {
      return view.getUint16(offset, true);
    }

    function read32(view, offset) {
      return view.getUint32(offset, true);
    }

    function status(text, error) {
      statusEl.textContent = text || '';
      statusEl.classList.toggle('error', !!error);
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }
  </script>
</body>
</html>
