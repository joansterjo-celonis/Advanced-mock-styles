name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Feedback + theme-library config. Set VITE_JSONBIN_KEY as a repo secret;
        # without it the feature falls back to per-browser localStorage (no sharing).
        # Bin ids have safe defaults in code; override via secrets/vars only if needed.
        env:
          VITE_JSONBIN_KEY: ${{ secrets.VITE_JSONBIN_KEY }}
          VITE_JSONBIN_FEEDBACK_BIN: ${{ secrets.VITE_JSONBIN_FEEDBACK_BIN }}
          VITE_JSONBIN_THEMES_BIN: ${{ secrets.VITE_JSONBIN_THEMES_BIN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
